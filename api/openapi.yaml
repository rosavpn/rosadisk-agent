openapi: "3.0.3"
info:
  title: Rosadisk Agent API
  description: API service for Rosadisk Agent
  version: "1.0.0"
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /_health:
    get:
      summary: Health check endpoint
      operationId: GetHealth
      tags:
        - health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /openapi.json:
    get:
      summary: Get OpenAPI specification in JSON format
      operationId: GetOpenAPIJSON
      tags:
        - docs
      responses:
        "200":
          description: OpenAPI specification
          content:
            application/json:
              schema:
                type: object

  /openapi.yaml:
    get:
      summary: Get OpenAPI specification in YAML format
      operationId: GetOpenAPIYAML
      tags:
        - docs
      responses:
        "200":
          description: OpenAPI specification
          content:
            text/yaml:
              schema:
                type: string

  /v1/disks:
    get:
      summary: List available disks
      operationId: ListDisks
      tags:
        - disks
      responses:
        "200":
          description: List of disks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
          example: "2026-05-27T00:00:00Z"

    DiskListResponse:
      type: object
      required:
        - disks
      properties:
        disks:
          type: array
          items:
            $ref: "#/components/schemas/Disk"

    Disk:
      type: object
      required:
        - name
        - size
        - type
      properties:
        name:
          type: string
          description: Device name (e.g., sda, nvme0n1)
          example: sda
        size:
          type: integer
          description: Size in bytes
          example: 500107862016
        type:
          type: string
          description: Device type (always "disk")
          example: disk
        vendor:
          type: string
          nullable: true
          description: Device vendor
          example: ATA
        model:
          type: string
          nullable: true
          description: Device model
          example: WDC WD10EZEX-08L

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
          example: failed to list disks
